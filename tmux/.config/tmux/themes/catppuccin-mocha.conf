# Catppuccin-Mocha theme colors
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_cyan="#94e2d5"
thm_black="#11111b"
thm_gray="#313244"
thm_magenta="#cba6f7"
thm_pink="#f5c2e7"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_orange="#fab387"
thm_black4="#45475a"

# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"
set-option -g status-position top

# Messages
set -g message-style "fg=${thm_green},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_green},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_green},bg=${thm_bg},nobold,nounderscore,noitalics]ī‚¶#[fg=${thm_bg},bg=${thm_green},nobold,nounderscore,noitalics]#I #[fg=${thm_fg},bg=${thm_gray}] #W#[fg=${thm_gray}]#[bg=${thm_bg}]ī‚´ "

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]ī‚¶#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics]#I #[fg=${thm_fg},bg=${thm_gray}] #W#[fg=${thm_gray}]#[bg=${thm_bg}]ī‚´ "

# Statusline - right side
set -g status-right "#{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_green}]}#[bg=${thm_gray}]ī‚¶#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_green}]}#[fg=${thm_bg}]ī˛• #[fg=${thm_fg},bg=${thm_gray}] #S#[fg=${thm_gray}]#[bg=${thm_bg}]ī‚´ "

# Statusline - left side (empty)
set -g status-left " "

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"
